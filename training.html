<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Training • Flags, Countries & Capitals</title>
  <link rel="icon" href="icon-192.png" sizes="192x192">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Lightweight, component-scoped additions for Training page */
    .toolbar { display: flex; flex-wrap: wrap; align-items: center; gap: .5rem; margin: 1rem 0; }
    .toolbar .spacer { flex: 1 1 auto; }
    .filters { display:flex; align-items:center; gap:.5rem; flex-wrap:wrap; }
    .badge { display:inline-block; min-width:1.5em; padding:0 .5em; border-radius:999px; background:#eee; color:#333; font-size:.8rem; text-align:center; }
    .pill { display:inline-block; padding:.125rem .5rem; border-radius:999px; background:#f2f4f7; color:#333; font-size:.8rem; margin:.125rem; white-space:nowrap; }
    .flag-img { height:32px; transition:height .15s ease; cursor:pointer; }
    .flag-img.expanded { height:280px; }
    .flag-cell { outline:none; }
    .table { width:100%; border-collapse: collapse; }
    .table th, .table td { padding:.5rem; border-bottom:1px solid #e6e6e6; vertical-align:top; }
    .table th { cursor:pointer; user-select:none; white-space:nowrap; }
    .table th .caret { margin-left:.35rem; font-size:.85em; opacity:.75; }
    .grid { display:grid; grid-template-columns:1fr; gap:1rem; }
    .group-panel { border:1px solid #e6e6e6; border-radius:.5rem; padding:.75rem; max-height:280px; overflow:auto; }
    .group-panel h3 { margin:.25rem 0 .5rem; font-size:1rem; display:flex; align-items:center; gap:.5rem; }
    .group-actions { display:flex; gap:.5rem; margin-bottom:.5rem; }
    .input-wrap { position:relative; display:inline-block; }
    .input-wrap input[type="text"]{ padding-right:2rem; }
    .clear-btn { position:absolute; right:.35rem; top:50%; transform:translateY(-50%); border:0; background:transparent; cursor:pointer; font-size:1.1rem; line-height:1; color:#777; }
    @media (min-width: 900px) {
      .grid { grid-template-columns: 300px 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Training</h1>
    <p>Study the full list of flags, countries & capitals. Filter by text and groups. Click a flag to expand.</p>
  </header>

  <section class="toolbar">
    <div class="filters">
      <label for="textFilter">Filter</label>
      <div class="input-wrap">
        <input id="textFilter" type="text" placeholder="Search country or capital" aria-label="Search country or capital" />
        <button id="clearTextBtn" class="clear-btn" title="Clear">×</button>
      </div>
      <span id="resultsBadge" class="badge" aria-live="polite">0</span>
    </div>
    <div class="spacer"></div>
  </section>

  <section class="grid">
    <aside>
      <div class="group-panel" aria-labelledby="groupsLabel">
        <h3 id="groupsLabel">Groups <span id="groupsSelectedBadge" class="badge">0</span></h3>
        <div class="group-actions">
          <button id="btnSelectAll" type="button">All</button>
          <button id="btnSelectNone" type="button">None</button>
        </div>
        <div id="groupList"></div>
      </div>
    </aside>

    <div>
      <table class="table" id="trainTable">
        <thead>
          <tr>
            <th data-key="country" scope="col">Country <span class="caret" aria-hidden="true"></span></th>
            <th data-key="capital" scope="col">Capital <span class="caret" aria-hidden="true"></span></th>
            <th data-key="flag" scope="col">Flag <span class="caret" aria-hidden="true"></span></th>
            <th scope="col">Groups</th>
          </tr>
        </thead>
        <tbody id="trainBody"></tbody>
      </table>
    </div>
  </section>

  <script src="data_v2.js"></script>
  <script>
  // Older JS (no modern syntax) to match Safari/WebView compatibility
  (function(){
    // namespace + storage keys
    var STORE_SORT = 'gt.v2.train.sort';
    var STORE_GROUPS = 'gt.v2.train.groups';

    // defensive DATA check
    if (typeof DATA === 'undefined' || !DATA || !DATA.length) {
      console.error('DATA is missing. Ensure data_v2.js is loaded before this script.');
      window.DATA = [];
    }

    // Normalize groups on data rows to []
    for (var i=0;i<DATA.length;i++) {
      if (!DATA[i].groups) DATA[i].groups = [];
    }

    var textFilterEl = document.getElementById('textFilter');
    var clearTextBtn = document.getElementById('clearTextBtn');
    var resultsBadge = document.getElementById('resultsBadge');
    var groupsSelectedBadge = document.getElementById('groupsSelectedBadge');
    var groupListEl = document.getElementById('groupList');
    var tbody = document.getElementById('trainBody');
    var table = document.getElementById('trainTable');

    // Build distinct group list
    var groupSet = {};
    for (var j=0;j<DATA.length;j++) {
      var gs = DATA[j].groups || [];
      for (var k=0;k<gs.length;k++) {
        var g = String(gs[k]).trim();
        if (g) groupSet[g] = true;
      }
    }
    var groups = [];
    for (var gk in groupSet) { if (groupSet.hasOwnProperty(gk)) groups.push(gk); }
    groups.sort();

    // Restore selected groups from storage
    var selectedGroups = [];
    try { var saved = window.localStorage.getItem(STORE_GROUPS); if (saved) selectedGroups = JSON.parse(saved); } catch(e){}

    // Render group checkbox list
    function renderGroupList(){
      var html = '';
      for (var i=0;i<groups.length;i++) {
        var id = 'grp_'+i;
        var label = groups[i];
        var checked = selectedGroups.indexOf(label) !== -1 ? ' checked' : '';
        html += '<div><label><input type="checkbox" data-group="'+escapeHtml(label)+'"'+checked+'> '+escapeHtml(label)+'</label></div>';
      }
      groupListEl.innerHTML = html;
      updateGroupsSelectedBadge();
    }

    function updateGroupsSelectedBadge(){
      groupsSelectedBadge.textContent = String(selectedGroups.length);
    }

    function saveSelectedGroups(){
      try { window.localStorage.setItem(STORE_GROUPS, JSON.stringify(selectedGroups)); } catch(e){}
    }

    function escapeHtml(s){
      return String(s)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;')
        .replace(/'/g,'&#39;');
    }

    // Sorting
    var sortState = { key: 'country', dir: 'asc' };
    try { var s = window.localStorage.getItem(STORE_SORT); if (s) sortState = JSON.parse(s); } catch(e){}

    function saveSort(){
      try { window.localStorage.setItem(STORE_SORT, JSON.stringify(sortState)); } catch(e){}
    }

    function compare(a,b,key){
      var av = key === 'flag' ? (a.flag || '') : key === 'capital' ? (a.capital || '') : (a.country || a.name || '');
      var bv = key === 'flag' ? (b.flag || '') : key === 'capital' ? (b.capital || '') : (b.country || b.name || '');
      av = String(av).toLowerCase();
      bv = String(bv).toLowerCase();
      if (av < bv) return sortState.dir === 'asc' ? -1 : 1;
      if (av > bv) return sortState.dir === 'asc' ? 1 : -1;
      return 0;
    }

    function setCaret(){
      var ths = table.tHead ? table.tHead.rows[0].cells : [];
      for (var i=0;i<ths.length;i++){
        var th = ths[i];
        var key = th.getAttribute('data-key');
        var caret = th.querySelector('.caret');
        if (caret) {
          if (key === sortState.key) {
            caret.textContent = sortState.dir === 'asc' ? '▲' : '▼';
            caret.style.visibility = 'visible';
          } else {
            caret.textContent = '';
            caret.style.visibility = 'hidden';
          }
        }
      }
    }

    // Filtering
    function passesGroupFilter(item){
      if (!selectedGroups || selectedGroups.length === 0) return true;
      var itemGroups = item.groups || [];
      for (var i=0;i<itemGroups.length;i++) {
        if (selectedGroups.indexOf(String(itemGroups[i])) !== -1) return true;
      }
      return false;
    }

    function passesTextFilter(item){
      var q = String(textFilterEl.value || '').toLowerCase();
      if (!q) return true;
      var country = String(item.country || item.name || '').toLowerCase();
      var capital = String(item.capital || '').toLowerCase();
      return country.indexOf(q) !== -1 || capital.indexOf(q) !== -1;
    }

    function toggleFlag(img){
      var expanded = img.className.indexOf('expanded') !== -1;
      // collapse any expanded
      var imgs = document.querySelectorAll('.flag-img.expanded');
      for (var i=0;i<imgs.length;i++) imgs[i].className = imgs[i].className.replace(' expanded','');
      if (!expanded) img.className += ' expanded';
    }

    function collapseFlags(){
      var imgs = document.querySelectorAll('.flag-img.expanded');
      for (var i=0;i<imgs.length;i++) imgs[i].className = imgs[i].className.replace(' expanded','');
    }

    function render(){
      // apply filters
      var rows = [];
      for (var i=0;i<DATA.length;i++) {
        var it = normalizeRow(DATA[i]);
        if (passesTextFilter(it) && passesGroupFilter(it)) rows.push(it);
      }
      // sort
      rows.sort(function(a,b){ return compare(a,b,sortState.key); });
      // render
      var out = '';
      for (var r=0;r<rows.length;r++) {
        var rx = rows[r];
        var chips = '';
        for (var c=0;c<rx.groups.length;c++) chips += '<span class="pill">'+escapeHtml(rx.groups[c])+'</span>';
        out += '<tr>'+
          '<td>'+escapeHtml(rx.country)+'</td>'+
          '<td>'+escapeHtml(rx.capital || '')+'</td>'+
          '<td><div class="flag-cell" tabindex="0" role="button" aria-pressed="false">'+
              '<img class="flag-img" src="'+escapeHtml(rx.flag)+'" alt="Flag of '+escapeHtml(rx.country)+'" />'+
            '</div></td>'+
          '<td>'+chips+'</td>'+
        '</tr>';
      }
      tbody.innerHTML = out;
      resultsBadge.textContent = String(rows.length);

      // wire flag toggles
      var cells = tbody.querySelectorAll('.flag-cell');
      var onClick = function(e){ var img = this.querySelector('img'); if (img) toggleFlag(img); };
      var onKey = function(e){
        e = e || window.event;
        var key = e.key || e.keyCode;
        if (key === 'Enter' || key === ' ' || key === 13 || key === 32) { e.preventDefault(); var img = this.querySelector('img'); if (img) toggleFlag(img); }
        if (key === 'Escape' || key === 'Esc' || key === 27) { collapseFlags(); }
      };
      for (var i=0;i<cells.length;i++) {
        cells[i].addEventListener('click', onClick, false);
        cells[i].addEventListener('keydown', onKey, false);
        cells[i].addEventListener('touchstart', onClick, {passive:true});
      }
    }

    function normalizeRow(item){
      return {
        country: item.country || item.name || '',
        capital: item.capital || '',
        flag: item.flag || item.image || item.img || '',
        groups: item.groups || []
      };
    }

    // header click (sorting)
    if (table && table.tHead && table.tHead.rows[0]){
      var ths = table.tHead.rows[0].cells;
      for (var i=0;i<ths.length;i++){
        (function(th){
          var key = th.getAttribute('data-key');
          if (!key) return;
          th.addEventListener('click', function(){
            if (sortState.key === key) sortState.dir = sortState.dir === 'asc' ? 'desc' : 'asc';
            else { sortState.key = key; sortState.dir = 'asc'; }
            saveSort();
            setCaret();
            render();
          }, false);
        })(ths[i]);
      }
    }

    // text filter
    textFilterEl.addEventListener('input', function(){ render(); }, false);
    clearTextBtn.addEventListener('click', function(){ textFilterEl.value=''; textFilterEl.focus(); render(); }, false);

    // group selection events
    groupListEl.addEventListener('change', function(e){
      var t = e.target || e.srcElement;
      if (t && t.type === 'checkbox' && t.getAttribute('data-group') != null) {
        var label = t.getAttribute('data-group');
        var idx = selectedGroups.indexOf(label);
        if (t.checked && idx === -1) selectedGroups.push(label);
        if (!t.checked && idx !== -1) selectedGroups.splice(idx,1);
        updateGroupsSelectedBadge();
        saveSelectedGroups();
        render();
      }
    }, false);

    // Bulk actions
    document.getElementById('btnSelectAll').addEventListener('click', function(){ selectedGroups = groups.slice(0); saveSelectedGroups(); renderGroupList(); render(); }, false);
    document.getElementById('btnSelectNone').addEventListener('click', function(){ selectedGroups = []; saveSelectedGroups(); renderGroupList(); render(); }, false);

    // init
    renderGroupList();
    setCaret();
    render();

    // SW register (optional)
    if ('serviceWorker' in navigator) { try { navigator.serviceWorker.register('service-worker.js'); } catch(e){} }
  })();
  </script>
</body>
</html>
