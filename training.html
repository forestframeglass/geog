<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Training – Geography Trainer</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* page-scoped styles */
    .train-wrap{max-width:980px;margin:16px auto;padding:0 16px}
    .controls{display:flex;gap:8px;align-items:center;margin:8px 0 12px;flex-wrap:wrap}
    .controls input{flex:1;min-width:220px;padding:8px 10px;border-radius:6px;border:1px solid #374151;background:#0b1220;color:var(--ink)}
    .flagcol img{max-height:36px;border:1px solid #374151;border-radius:3px}
    th[data-key]{cursor:pointer}

    .group-select{ min-width:200px; padding:8px 10px; border-radius:6px; border:1px solid #374151; background:#0b1220; color:var(--ink); }

    /* Expanded flag preview: fixed target height with small-screen cap */
    .flagcol img.expanded{
      height: 350px;
      max-height: 40vh;
      width: auto;
      border-color: var(--accent);
      outline: 2px solid rgba(56,189,248,0.35);
      display: block;
      margin: 0 auto;
    }
    .flagcol img{ transition: max-height 120ms ease, height 120ms ease; }

    /* Result count badge */
    .count-badge{
      display:inline-block; background:#1f2937; color:var(--ink);
      border:1px solid #374151; padding:6px 10px; border-radius:999px;
      line-height:1; white-space:nowrap; font-size:14px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Training</h1>
    <nav class="modes">
      <a class="btn-link" href="index.html">Home</a>
      <a class="btn-link" href="quiz.html">Start a Game</a>
    </nav>
  </header>
  <main class="train-wrap">
    <p class="muted">Browse the full list (Flag, Country, Capital). Use the filter to narrow by text or by group. Click headers to sort. Click a flag to expand it.</p>

    <div class="controls">
      <select id="groupSelect" class="group-select" aria-label="Filter by group">
        <option value="">All groups</option>
      </select>

      <input id="filterInput" type="text" placeholder="Filter by country, capital, or ISO…" aria-label="Filter table" />
      <button id="clearFilter" class="btn-link" type="button">Clear</button>

      <!-- NEW: result count badge -->
      <span id="resultCount" class="count-badge" aria-live="polite">Showing 0 of 0</span>
    </div>

    <div class="panel">
      <h2>Study Table</h2>
      <table class="reveal-table" aria-label="Training table">
        <thead>
          <tr>
            <th data-key="flag">Flag</th>
            <th data-key="country" aria-sort="ascending">Country</th>
            <th data-key="capital">Capital</th>
          </tr>
        </thead>
        <tbody id="trainBody"></tbody>
      </table>
    </div>
  </main>
  <footer><small class="centerfoot"></small></footer>

  <script src="data_v2.js"></script>
  <script>
  (function(){
    const body = document.getElementById('trainBody');
    const input = document.getElementById('filterInput');
    const clearBtn = document.getElementById('clearFilter');
    const groupSel = document.getElementById('groupSelect');
    const countEl = document.getElementById('resultCount');
    const rows = Array.isArray(window.DATA) ? window.DATA.slice() : [];

    let sortKey = 'country';
    let sortDir = 1; // 1 asc, -1 desc
    let expandedImg = null;

    function norm(s){ return (s??'').toString().toLowerCase(); }
    function normToken(s){ return (s??'').toString().trim().replace(/\s+/g,' '); }

    // GROUPS SUPPORT (works with either `groups:[]` or `grouping:"a, b"`)
    function rowGroups(r){
      if (Array.isArray(r.groups)) {
        return r.groups.map(g => normToken(g)).filter(Boolean);
      }
      if (r.grouping != null) {
        return String(r.grouping).split(',').map(x => normToken(x)).filter(Boolean);
      }
      return [];
    }
    function buildGroupsMapWithCounts(list){
      const map = new Map(); // key -> {label, count}
      for (const r of list){
        for (const g of rowGroups(r)){
          const key = g.toLowerCase();
          if (!map.has(key)) map.set(key, {label: g, count: 0});
          map.get(key).count += 1;
        }
      }
      return map;
    }
    function populateGroupSelect(){
      const gmap = buildGroupsMapWithCounts(rows);
      if (gmap.size === 0) return; // leave only "All groups"
      const frag = document.createDocumentFragment();
      const sorted = Array.from(gmap.entries()).sort((a,b)=> a[1].label.localeCompare(b[1].label, undefined, {sensitivity:'base'}));
      for (const [value,meta] of sorted){
        const opt = document.createElement('option');
        opt.value = value;
        opt.textContent = `${meta.label} (${meta.count})`;
        frag.appendChild(opt);
      }
      groupSel.appendChild(frag);
    }

    // FILTERING
    function matches(r, q){
      if(!q) return true;
      const t = q.trim().toLowerCase();
      return norm(r.iso).includes(t)
        || norm(r.country).includes(t)
        || (Array.isArray(r.countryAlt) && r.countryAlt.some(a=>norm(a).includes(t)))
        || norm(r.capital).includes(t)
        || (Array.isArray(r.capitalAlt) && r.capitalAlt.some(a=>norm(a).includes(t)));
    }
    function inSelectedGroup(r){
      const sel = groupSel.value;
      if (!sel) return true; // All groups
      const list = rowGroups(r).map(g => g.toLowerCase());
      return list.includes(sel);
    }

    // SORTING
    function cmp(a,b){
      const A = (sortKey==='flag') ? (a.flag??'') : (a[sortKey]??'');
      const B = (sortKey==='flag') ? (b.flag??'') : (b[sortKey]??'');
      return A.localeCompare(B, undefined, {sensitivity:'base'}) * sortDir;
    }

    // RENDER + FLAG EXPAND/COLLAPSE
    function collapseExpanded(){
      if (expandedImg){
        expandedImg.classList.remove('expanded');
        expandedImg.setAttribute('aria-expanded','false');
        expandedImg = null;
      }
    }
    function toggleExpand(img){
      if (expandedImg === img){
        collapseExpanded();
        return;
      }
      collapseExpanded();
      img.classList.add('expanded');
      img.setAttribute('aria-expanded','true');
      expandedImg = img;
      img.scrollIntoView({block:'nearest', inline:'nearest', behavior:'smooth'});
    }

    function updateCount(current, total){
      if (!countEl) return;
      countEl.textContent = `Showing ${current} of ${total}`;
    }

    function render(list){
      body.innerHTML='';
      for(const r of list){
        const tr=document.createElement('tr');

        const tdF=document.createElement('td');
        tdF.className='flagcol';
        if(r.flag){
          const img=document.createElement('img');
          img.src=r.flag;
          img.alt='';
          img.setAttribute('role','button');
          img.setAttribute('tabindex','0');
          img.setAttribute('aria-expanded','false');
          img.addEventListener('click', ()=> toggleExpand(img));
          img.addEventListener('keydown', (e)=>{
            const k = e.key?.toLowerCase();
            if (k==='enter' || k===' ' || k==='spacebar'){
              e.preventDefault();
              toggleExpand(img);
            }
          });
          tdF.appendChild(img);
        }

        const tdC=document.createElement('td'); tdC.textContent=r.country??'';
        const tdK=document.createElement('td'); tdK.textContent=r.capital??'';

        tr.appendChild(tdF); tr.appendChild(tdC); tr.appendChild(tdK);
        body.appendChild(tr);
      }
      if(!list.length){
        const tr=document.createElement('tr'); const td=document.createElement('td');
        td.colSpan=3; td.textContent='No rows match your filter.'; tr.appendChild(td); body.appendChild(tr);
      }
    }

    function apply(){
      const total = rows.length;
      const q=input.value??'';
      const list = rows.filter(r => matches(r,q) && inSelectedGroup(r)).sort(cmp);
      updateCount(list.length, total);
      render(list);
    }

    // Wire up controls
    input.addEventListener('input', apply);
    groupSel.addEventListener('change', apply);
    clearBtn.addEventListener('click', ()=>{
      input.value='';
      groupSel.value='';
      apply();
      input.focus();
    });

    // Sortable headers
    const thead = document.querySelector('table.reveal-table thead');
    thead.addEventListener('click', (e)=>{
      const th = e.target.closest('th[data-key]'); if(!th) return;
      const key = th.getAttribute('data-key');
      if(key===sortKey){ sortDir *= -1; } else { sortKey = key; sortDir = 1; }
      thead.querySelectorAll('th[data-key]').forEach(el=> el.removeAttribute('aria-sort'));
      th.setAttribute('aria-sort', sortDir===1? 'ascending':'descending');
      apply();
    });

    // Init
    populateGroupSelect();
    apply();
  })();
  </script>
</body>
</html>
